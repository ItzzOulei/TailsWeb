<!DOCTYPE html>
<html lang="en-us">

<head>
  <meta charset="utf-8">
  <title>Unity WebGL Player | Tails2.0</title>
  <style>
    /* 1. Centers the game on the screen and makes the background black */
    body {
      padding: 0;
      margin: 0;
      background: #231F20;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
    }

    /* 2. Locks the container to 16:9 and prevents it from becoming massive on 4K/Ultrawide monitors */
    #unity-container {
      aspect-ratio: 16 / 9;
      width: 100%;
      max-width: 1920px;
      max-height: 100%;
      position: relative;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.8);
    }

    #unity-canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
  </style>
</head>

<body>

  <div id="unity-container">
    <canvas id="unity-canvas" tabindex="-1"></canvas>
  </div>

  <script src="Build/TailsWebBuild.loader.js"></script>
  <script>
    const canvas = document.querySelector("#unity-canvas");

    const config = {
      dataUrl: "Build/TailsWebBuild.data",
      frameworkUrl: "Build/TailsWebBuild.framework.js",
      codeUrl: "Build/TailsWebBuild.wasm",
      streamingAssetsUrl: "StreamingAssets",
      companyName: "DefaultCompany",
      productName: "Tails2.0",
      productVersion: "1.0",

      // 3. Tells Unity to use the monitor's native high resolution
      devicePixelRatio: window.devicePixelRatio || 1,
    };

    createUnityInstance(canvas, config).then((unityInstance) => {
      // 4. Force Unity to match the CSS container size when the window is resized
      resizeCanvas();
      window.addEventListener('resize', resizeCanvas);

      function resizeCanvas() {
        canvas.width = canvas.clientWidth * window.devicePixelRatio;
        canvas.height = canvas.clientHeight * window.devicePixelRatio;
      }
    });
  </script>
</body>

</html>
